# This is used to run the whole application + dependencies
# Use './build-docker-images.sh' to create docker images

services:
    activemq:
        image: apache/activemq-artemis:2.44.0
        environment:
            - ARTEMIS_USER=admin
            - ARTEMIS_PASSWORD=admin
        ports:
            - "8161:8161"     # Web console
            - "61616:61616"   # OpenWire/JMS
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8161" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    mysql:
        image: mysql:8.4  # Use a valid, stable version
        environment:
            - MYSQL_USER=seedappuser
            - MYSQL_ROOT_PASSWORD=password
            - MYSQL_DATABASE=seedapp
        command: >
            mysqld --lower_case_table_names=1
                   --character-set-server=utf8mb4
                   --explicit_defaults_for_timestamp=ON
        ports:
            - "3306:3306"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    emailhog:
        image: mailhog/mailhog  # Official image name (richarvey is outdated)
        ports:
            - "1025:1025"   # SMTP
            - "8025:8025"   # Web UI
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8025" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    zipkin:
        image: openzipkin/zipkin
        ports:
            - "9411:9411"
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9411/health" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    keycloak:
        image: quay.io/keycloak/keycloak:26.6.1
        command: start-dev --import-realm
        environment:
            - KC_BOOTSTRAP_ADMIN_USERNAME=admin
            - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
            - KC_FEATURES=scripts
            - KC_HTTP_PORT=8080
            - KC_HTTPS_PORT=9445
            - KC_DB=dev-file  # dev-file means H2 (in-memory); okay for dev
        volumes:
            - ../main-app/main-webapp/src/main/resources/keycloak/:/opt/keycloak/data/import/
        ports:
            - "8080:8080"
            - "9445:9445"
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ready" ]
            interval: 15s
            timeout: 5s
            retries: 15
            start_period: 60s

    content-checker-service:
        image: gtapp-content-checker-service:latest
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        depends_on:
            zipkin:
                condition: service_healthy
            activemq:
                condition: service_healthy

    email-service:
        image: gtapp-email-service:latest
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        depends_on:
            emailhog:
                condition: service_healthy
            zipkin:
                condition: service_healthy

    trend-service:
        image: gtapp-trend-service:latest
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        depends_on:
            zipkin:
                condition: service_healthy

    report-service:
        image: gtapp-report-service:latest
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        depends_on:
            zipkin:
                condition: service_healthy
            mysql:
                condition: service_healthy
            keycloak:
                condition: service_healthy

    main-webapp:
        image: gtapp-main-webapp:latest
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        volumes:
            - /var/tmp/:/tmp/uploads/attachments/
        depends_on:
            zipkin:
                condition: service_healthy
            email-service:
                condition: service_started  # assumes email-service starts quickly
            mysql:
                condition: service_healthy
            activemq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
