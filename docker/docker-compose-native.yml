# Runs the whole application using GraalVM native images (no JVM).
# Build native images first:  ./build-native-images.sh
#
# Image naming: native images use -native suffix to distinguish from JVM images
#   JVM:   gtapp-content-checker-service:latest
#   Native: gtapp-content-checker-service-native:latest

services:
    activemq:
        image: apache/activemq-artemis:2.44.0
        environment:
            - ARTEMIS_USER=admin
            - ARTEMIS_PASSWORD=admin
        ports:
            - "8161:8161"     # Web console
            - "61616:61616"   # Messaging port
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8161" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    mysql:
        image: mysql:8.4  # 9.7 doesn't exist; using stable 8.4 LTS
        environment:
            - MYSQL_USER=seedappuser
            - MYSQL_ROOT_PASSWORD=password
            - MYSQL_DATABASE=seedapp
        command: >
            mysqld --lower_case_table_names=1
                   --character-set-server=utf8mb4
                   --explicit_defaults_for_timestamp=ON
        ports:
            - "3306:3306"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    emailhog:
        image: mailhog/mailhog  # Updated to official image
        ports:
            - "1025:1025"   # SMTP
            - "8025:8025"   # Web UI
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8025" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    zipkin:
        image: openzipkin/zipkin
        ports:
            - "9411:9411"
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9411/health" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    keycloak:
        image: quay.io/keycloak/keycloak:26.6.1
        command: start-dev --import-realm
        environment:
            - KC_BOOTSTRAP_ADMIN_USERNAME=admin
            - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
            - KC_FEATURES=scripts
            - KC_HTTP_PORT=8080
            - KC_HTTPS_PORT=9445
            - KC_DB=dev-file
            - KC_HEALTH_ENABLED=true  # Required to expose the management/health endpoint on port 9000
        volumes:
            - ../main-app/main-webapp/src/main/resources/keycloak/:/opt/keycloak/data/import
        ports:
            - "8080:8080"
            - "9445:9445"
        healthcheck:
            # Keycloak 26+ management/health endpoint is on port 9000
            test: [ "CMD", "curl", "-f", "http://localhost:9000/health/ready" ]
            interval: 15s
            timeout: 5s
            retries: 15
            start_period: 60s

    content-checker-service-native:
        image: gtapp-content-checker-service-native:latest
        environment:
            - SPRING_PROFILES_ACTIVE=native
        ports:
            - "8083:8080"
        depends_on:
            zipkin:
                condition: service_healthy
            activemq:
                condition: service_healthy

    email-service-native:
        image: gtapp-email-service-native:latest
        environment:
            - SPRING_PROFILES_ACTIVE=native
        ports:
            - "8084:8080"
        depends_on:
            emailhog:
                condition: service_healthy
            zipkin:
                condition: service_healthy

    trend-service-native:
        image: gtapp-trend-service-native:latest
        environment:
            - SPRING_PROFILES_ACTIVE=native
        ports:
            - "8085:8080"
        depends_on:
            zipkin:
                condition: service_healthy
            activemq:
                condition: service_healthy

    report-service-native:
        image: gtapp-report-service-native:latest
        environment:
            - SPRING_PROFILES_ACTIVE=native
        ports:
            - "8086:8080"
        depends_on:
            zipkin:
                condition: service_healthy
            mysql:
                condition: service_healthy
            keycloak:
                condition: service_healthy

    main-webapp-native:
        image: gtapp-main-webapp-native:latest
        environment:
            - SPRING_PROFILES_ACTIVE=native
        ports:
            - "8081:8080"
        volumes:
            - /var/tmp/:/tmp/uploads/attachments/
        depends_on:
            zipkin:
                condition: service_healthy
            email-service-native:
                condition: service_started
            content-checker-service-native:
                condition: service_started
            mysql:
                condition: service_healthy
            activemq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
